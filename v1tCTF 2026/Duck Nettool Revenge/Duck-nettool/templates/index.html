<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NetTool v1</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --panel: #111827;
        --line: #334155;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Consolas, "Courier New", monospace;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 35%),
          linear-gradient(180deg, #020617 0%, var(--bg) 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 12px;
        margin: 20px 0;
      }

      input, button, pre {
        border-radius: 12px;
        border: 1px solid var(--line);
        font: inherit;
      }

      input {
        background: #020617;
        color: var(--text);
        padding: 14px 16px;
      }

      button {
        width: fit-content;
        background: var(--accent);
        color: #111827;
        padding: 12px 18px;
        cursor: pointer;
        font-weight: 700;
      }

      pre {
        min-height: 220px;
        margin: 0;
        padding: 16px;
        background: #020617;
        overflow-x: auto;
        white-space: pre-wrap;
      }

      .hint {
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>NetTool v1t</h1>
      <p class="hint">Example: <code>127.0.0.1</code></p>

      <form method="post">
        <input
          id="target"
          name="target"
          type="text"
          placeholder="8.8.8.8"
          value="{{ target }}"
          autocomplete="off"
          required
        >
        <button type="submit">Run ping</button>
      </form>

      <pre>{{ output or "No output yet." }}</pre>
    </main>
  </body>
  </html>
